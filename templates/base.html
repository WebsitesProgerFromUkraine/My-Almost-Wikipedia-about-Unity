<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>{% block title %}{% endblock %}</title>
  <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #f8f9fa;
      border-bottom: 1px solid #ddd;
    }
    header .logo a {
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      text-decoration: none;
      color: #333;
      font-size: 18px;
      transition: color 0.3s;
    }
    nav ul li a:hover {
      color: #007bff;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      nav ul {
        flex-direction: column;
        gap: 10px;
      }
      nav ul li a {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      header .logo a {
        font-size: 18px;
      }
      nav ul li a {
        font-size: 14px;
      }
    }

  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="/">Unity Info</a>
    </div>
    <nav>
      <ul>
        <li><a href="{{ url_for('index') }}">Основне про Unity</a></li>
        <li><a href="{{ url_for('about') }}">Заглиблено про Unity</a></li>
        <li><a href="{{ url_for('facts') }}">Цікаві факти про Unity</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    {% block body %}{% endblock %}
</body>
</html>
